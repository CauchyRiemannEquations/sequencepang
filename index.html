<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>수열팡 (Sequence Pang) - 타임어택 메론 퍼즐 게임</title>
  <!-- 프리미엄 폰트 및 Jua/Outfit 적용 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-color: #121e15; /* 눈부심이 전혀 없는 딥 포레스트 메론 농장 다크 배경 */
      --card-bg: #f5f9f4; /* 새하얗지 않고 편안한 미색 아이보리 */
      --primary-color: #166534; /* 메론 짙은 잎새 초록색 */
      --primary-hover: #14532d;
      --accent-color: #84cc16; /* 메론 달콤한 과즙 연두색 */
      --accent-light: #ecfdf5;
      --text-main: #143820; /* 가독성 높은 딥 올리브 */
      --text-muted: #4b6a55;
      --tile-bg: #e6f4ea;
      --tile-selected-bg: #a7f3d0;
      --tile-selected-text: #14532d;
      --tile-last-bg: #166534;
      --tile-last-shadow: 0 0 16px rgba(22, 101, 52, 0.85);
      --success-color: #10b981;
      --danger-color: #ef4444;
      --border-radius: 24px;
      --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-user-select: none;
    }

    body {
      font-family: 'Jua', 'Outfit', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 12px;
      overflow: hidden;
    }

    /* 전체 화면 레이아웃 (싱글 플레이에 맞게 심플화) */
    .game-layout {
      width: 100%;
      max-width: 460px;
      position: relative;
    }

    /* 게임 보드 영역 컨테이너 */
    .game-container {
      width: 100%;
      background: var(--card-bg);
      border-radius: var(--border-radius);
      box-shadow: var(--shadow-lg);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: relative;
    }

    /* 모바일/좁은 화면 반응형 분기 */
    @media (max-width: 768px) {
      body {
        overflow-y: auto;
        justify-content: flex-start;
        padding-top: 10px;
        padding-bottom: 20px;
      }
      .game-layout {
        max-width: 440px;
      }
    }

    /* HUD 영역 */
    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #eef3ed;
      border-radius: 14px;
      padding: 10px 14px;
      border: 1px solid #ccdccb;
    }

    .hud-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .hud-label {
      font-size: 10px;
      font-weight: normal;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      margin-bottom: 2px;
    }

    .hud-value {
      font-size: 18px;
      font-weight: normal;
      color: var(--primary-color);
      transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .hud-value.pop {
      transform: scale(1.3);
    }

    .combo-badge {
      background: var(--accent-color);
      color: white;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: normal;
      margin-top: 4px;
      display: none;
      animation: bounce 0.4s infinite alternate;
    }

    @keyframes bounce {
      from { transform: translateY(0); }
      to { transform: translateY(-4px); }
    }

    /* 타이머 바 */
    .timer-container {
      position: relative;
      width: 100%;
      height: 24px;
      background: #ccdccb;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #9ab49f;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .timer-bar {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, var(--accent-color), var(--success-color));
      transition: width 0.1s linear, background-color 0.3s ease;
      z-index: 1;
    }

    .timer-bar.warning {
      background: linear-gradient(90deg, var(--danger-color), #f97316);
      animation: flashWarning 0.5s infinite alternate;
    }

    @keyframes flashWarning {
      from { filter: brightness(1); }
      to { filter: brightness(1.2); }
    }

    .timer-text {
      position: relative;
      z-index: 2;
      font-weight: normal;
      font-size: 12px;
      color: #14532d;
      text-shadow: 0 1px 2px rgba(255,255,255,0.7);
    }

    /* 실패 흔들림 */
    .shake {
      animation: shake 0.4s ease-in-out;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      15%, 45%, 75% { transform: translateX(-6px); }
      30%, 60%, 90% { transform: translateX(6px); }
    }

    /* 보드 */
    .board-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #a9caa5; /* 메론 톤다운 연두빛 배경 */
      border-radius: 18px;
      padding: 6px;
      touch-action: none;
      box-shadow: inset 0 2px 8px rgba(20, 83, 45, 0.2);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      grid-template-rows: repeat(6, 1fr);
      gap: 5px;
      width: 100%;
      height: 100%;
    }

    /* 과일 타일 스타일 (멜론-숫자 크기 밸런스 튜닝) */
    .tile {
      background-color: transparent; /* 뒷바탕 상자 제거하여 메론 형상만 오롯이 노출 */
      background-image: url('melon.png');
      background-size: 88% 88%; /* 메론을 더 탐스럽게 키움 */
      background-repeat: no-repeat;
      background-position: center;
      border-radius: 50%; /* 메론 원형 실루엣에 정확히 매칭 */
      display: flex;
      align-items: center;
      justify-content: center;
      /* 10이 메론 밖으로 튀어나가지 않도록 폰트 크기 미세 축소 */
      font-size: min(6vw, 6vh, 23px);
      font-weight: normal; /* 볼드체 가공 제거하여 기본 서체 본연의 미미하고 쾌적한 굵기 표현 */
      color: #112d11;
      /* 숫자가 메론 이미지 한복판에서 입체감 있게 보이도록 미세 섀도우 */
      text-shadow: 
        -2px -2px 0 #fff,  
         2px -2px 0 #fff,
        -2px  2px 0 #fff,
         2px  2px 0 #fff,
         0px  2px 3px rgba(0, 0, 0, 0.2);
      transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275), background-color 0.2s ease;
      cursor: pointer;
      position: relative;
    }

    /* 드래그 선택 중 (둥근 원형 피드백 광채 효과) */
    .tile.selected {
      background-color: rgba(22, 101, 52, 0.18); /* 투명 멜론에 맞춘 둥근 포레스트 그린 빛무리 */
      transform: scale(0.88);
      box-shadow: inset 0 0 10px rgba(22, 101, 52, 0.3);
      border-radius: 50%;
    }

    .tile.last-selected {
      background-color: rgba(132, 204, 22, 0.35); /* 둥근 과즙색 연두빛 광채 */
      box-shadow: var(--tile-last-shadow);
      animation: pulse 1s infinite alternate;
      border-radius: 50%;
    }

    @keyframes pulse {
      from { transform: scale(0.88); }
      to { transform: scale(0.93); }
    }

    .tile.matched {
      background-color: #84cc16 !important; /* 원형 연두빛 매칭 완결 동그라미 */
      color: white !important;
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
      transform: scale(1.08);
      z-index: 10;
      border-radius: 50%;
    }

    .tile.falling {
      transition: transform 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    /* SVG */
    .drag-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
    }

    .drag-line {
      fill: none;
      stroke: var(--primary-color);
      stroke-width: 5;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0.85;
      stroke-dasharray: 6 3;
      animation: dashMove 20s linear infinite;
    }

    @keyframes dashMove {
      to { stroke-dashoffset: -1000; }
    }

    /* 플로팅 점수 */
    .floating-score {
      position: absolute;
      color: #14532d;
      font-weight: normal;
      font-size: 24px;
      pointer-events: none;
      animation: floatUp 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      z-index: 100;
      text-shadow: 0 2px 6px rgba(255,255,255,0.8);
    }

    @keyframes floatUp {
      0% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(0.8) translateY(0);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(1.35) translateY(-70px);
      }
    }

    /* ===== 메인 화면 (Welcome Overlay) ===== */
    .welcome-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(160deg, #0b2013 0%, #163522 45%, #0d2718 100%);
      border-radius: var(--border-radius);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 300;
      overflow: hidden;
      opacity: 1;
      visibility: visible;
      transition: opacity 0.35s ease, visibility 0.35s ease, transform 0.35s ease;
    }

    .welcome-overlay.hide {
      opacity: 0;
      visibility: hidden;
      transform: scale(0.95);
      pointer-events: none;
    }

    /* 배경 파티클 (떠다니는 멜론들) */
    .melon-particle {
      position: absolute;
      font-size: 28px;
      opacity: 0.13;
      animation: floatParticle linear infinite;
      pointer-events: none;
      filter: blur(0.5px);
    }

    @keyframes floatParticle {
      0%   { transform: translateY(110%) rotate(0deg);   opacity: 0; }
      10%  { opacity: 0.13; }
      90%  { opacity: 0.13; }
      100% { transform: translateY(-110%) rotate(360deg); opacity: 0; }
    }

    /* 반짝이 */
    .sparkle {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #a3e635;
      animation: sparklePop 2.4s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes sparklePop {
      0%, 100% { transform: scale(0); opacity: 0; }
      40%       { transform: scale(1); opacity: 0.7; }
      70%       { transform: scale(0.6); opacity: 0.4; }
    }

    .welcome-card {
      width: 100%;
      max-width: 340px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
      z-index: 1;
    }

    /* 타이틀 그룹 */
    .welcome-title-grp {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .welcome-icon-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 4px;
    }

    .welcome-icon {
      width: 90px;
      height: 90px;
      animation: melonBounce 2.2s infinite alternate ease-in-out;
      filter: drop-shadow(0 8px 16px rgba(132,204,22,0.45));
    }

    /* 왕관 배지 */
    .melon-crown {
      position: absolute;
      top: -14px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 22px;
      animation: crownSpin 3s ease-in-out infinite alternate;
    }

    @keyframes crownSpin {
      from { transform: translateX(-50%) rotate(-8deg) scale(1); }
      to   { transform: translateX(-50%) rotate(8deg)  scale(1.1); }
    }

    @keyframes melonBounce {
      from { transform: translateY(0)    rotate(-4deg) scale(1);    }
      to   { transform: translateY(-12px) rotate(4deg)  scale(1.05); }
    }

    .welcome-title {
      font-size: 38px;
      color: #a3e635;
      letter-spacing: -0.01em;
      line-height: 1;
      text-shadow: 0 0 20px rgba(163,230,53,0.45), 0 4px 8px rgba(0,0,0,0.6);
    }

    .welcome-tagline {
      font-size: 12px;
      color: #6aab7a;
      letter-spacing: 0.08em;
    }

    /* 베스트 점수 배지 */
    .welcome-best {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: rgba(163,230,53,0.1);
      border: 1px solid rgba(163,230,53,0.25);
      border-radius: 50px;
      padding: 7px 18px;
      font-size: 13px;
      color: #a3e635;
    }

    .welcome-best-label {
      color: #6aab7a;
      font-size: 11px;
    }

    /* 하우 투 플레이 카드 */
    .how-to-play {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 16px;
      padding: 14px 16px;
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .htp-title {
      font-size: 11px;
      color: #6aab7a;
      letter-spacing: 0.1em;
      text-align: center;
      margin-bottom: 2px;
    }

    .htp-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 12px;
      color: #9fc9a8;
      line-height: 1.4;
    }

    .htp-icon {
      font-size: 15px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* 시작 버튼 */
    .btn-start {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #16a34a 0%, #15803d 100%);
      color: white;
      border: none;
      border-radius: 14px;
      font-family: inherit;
      font-size: 17px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4), 0 0 0 0 rgba(163,230,53,0.5);
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-start::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.12) 0%, transparent 60%);
      pointer-events: none;
    }

    .btn-start:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 28px rgba(0,0,0,0.45), 0 0 0 4px rgba(163,230,53,0.25);
    }

    .btn-start:active {
      transform: translateY(0);
    }

    /* 게임 오버 오버레이 */
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(18, 30, 21, 0.9);
      border-radius: var(--border-radius);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .gameover-card {
      background: var(--card-bg);
      width: 85%;
      border-radius: 20px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      transform: scale(0.8);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .overlay.show .gameover-card {
      transform: scale(1);
    }

    .gameover-title {
      font-size: 26px;
      font-weight: normal;
      color: var(--danger-color);
      margin-bottom: 6px;
    }

    .gameover-desc {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px dashed #cbdccb;
      padding: 6px 0;
      font-size: 14px;
    }
    
    .result-row:last-of-type {
      border-bottom: none;
      margin-bottom: 16px;
    }

    .result-label {
      font-weight: normal;
      color: var(--text-muted);
    }

    .result-val {
      font-weight: normal;
      color: var(--text-main);
    }

    .btn-retry {
      width: 100%;
      padding: 12px;
      background: var(--primary-color);
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: normal;
      font-size: 15px;
      cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.15);
      transition: all 0.2s ease;
    }

    .btn-retry:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>

  <div class="game-layout">
    
    <!-- 메인 게임 컨테이너 -->
    <div class="game-container" id="game-container">
      
      <!-- 웰컴 오버레이 (메인 화면) -->
      <div class="welcome-overlay" id="welcome-overlay">

        <!-- 배경 파티클 -->
        <span class="melon-particle" style="left:8%;  animation-duration:9s;  animation-delay:0s;   font-size:32px;">🍈</span>
        <span class="melon-particle" style="left:22%; animation-duration:12s; animation-delay:2s;   font-size:20px;">🍈</span>
        <span class="melon-particle" style="left:42%; animation-duration:8s;  animation-delay:4.5s; font-size:26px;">🍈</span>
        <span class="melon-particle" style="left:63%; animation-duration:11s; animation-delay:1.2s; font-size:18px;">🍈</span>
        <span class="melon-particle" style="left:80%; animation-duration:10s; animation-delay:3s;   font-size:30px;">🍈</span>
        <span class="melon-particle" style="left:91%; animation-duration:13s; animation-delay:5.5s; font-size:22px;">🍈</span>

        <!-- 반짝이 -->  
        <span class="sparkle" style="top:18%; left:15%; animation-delay:0s;"></span>
        <span class="sparkle" style="top:30%; left:78%; animation-delay:0.8s;"></span>
        <span class="sparkle" style="top:70%; left:25%; animation-delay:1.4s;"></span>
        <span class="sparkle" style="top:80%; left:65%; animation-delay:0.3s;"></span>
        <span class="sparkle" style="top:55%; left:88%; animation-delay:1.9s;"></span>

        <div class="welcome-card">
          <!-- 타이틀 -->
          <div class="welcome-title-grp">
            <div class="welcome-icon-wrap">
              <span class="melon-crown">👑</span>
              <img class="welcome-icon" src="melon.png" alt="melon">
            </div>
            <h1 class="welcome-title">수열팡</h1>
            <p class="welcome-tagline">🍈 Sequence Pang 🍈</p>
          </div>

          <!-- 베스트 스코어 -->
          <div class="welcome-best">
            <span class="welcome-best-label">최고 기록</span>
            <span id="welcome-best-val">0</span>
            <span style="font-size:11px; color:#6aab7a;">점</span>
          </div>

          <!-- 하우 투 플레이 -->
          <div class="how-to-play">
            <div class="htp-title">✦ 게임 방법 ✦</div>
            <div class="htp-row"><span class="htp-icon">👆</span><span>멜론을 드래그해서 <strong style="color:#a3e635;">등차·등비수열</strong>을 만드세요!</span></div>
            <div class="htp-row"><span class="htp-icon">🔥</span><span>연속으로 맞추면 <strong style="color:#a3e635;">콤보 보너스</strong> 획득!</span></div>
            <div class="htp-row"><span class="htp-icon">⏱️</span><span>60초 안에 최고 점수를 노려보세요!</span></div>
          </div>

          <!-- 시작 버튼 -->
          <button class="btn-start" id="btn-start">🍈 &nbsp;수열팡 시작하기</button>
        </div>
      </div>

      <!-- HUD 영역 (점수, 콤보 등) -->
      <div class="hud">
        <div class="hud-item">
          <div class="hud-label">최고 점수</div>
          <div class="hud-value" id="best-score-val">0</div>
        </div>
        <div class="hud-item">
          <div class="hud-label">현재 점수</div>
          <div class="hud-value" id="score-val">0</div>
        </div>
        <div class="hud-item">
          <div class="hud-label">콤보</div>
          <div class="hud-value">
            <span id="combo-val">0</span>
            <span class="combo-badge" id="combo-badge">🔥</span>
          </div>
        </div>
      </div>

      <!-- 타이머 영역 -->
      <div class="timer-container" id="timer-container">
        <div class="timer-bar" id="timer-bar"></div>
        <div class="timer-text" id="timer-text">60.0s</div>
      </div>

      <!-- 게임 보드 -->
      <div class="board-wrapper" id="board-wrapper">
        <div class="board" id="board"></div>
        <svg class="drag-svg">
          <path class="drag-line" id="drag-line" d=""></path>
        </svg>
      </div>

      <!-- 게임 오버 오버레이 -->
      <div class="overlay" id="gameover-overlay">
        <div class="gameover-card">
          <h2 class="gameover-title">타임 오버!</h2>
          <div class="gameover-desc">수고하셨습니다. 당신의 기록은...</div>
          
          <div class="result-row">
            <span class="result-label">최종 점수</span>
            <span class="result-val"><span id="final-score">0</span>점</span>
          </div>
          
          <button class="btn-retry" id="btn-retry">🔄 메인 화면으로 돌아가기</button>
        </div>
      </div>

    </div>
  </div>

  <script>
    // ----------------------------------------------------
    // 게임 엔진 상태 데이터
    // ----------------------------------------------------
    const BOARD_SIZE = 6;
    const MAX_TIME = 60.0;
    
    function getRandomNumber() {
      return Math.floor(Math.random() * 9) + 1;
    }
    
    let boardData = [];
    let selectedTiles = [];
    let isDragging = false;
    let isGameOver = false;
    let isGameActive = false;
    
    let score = 0;
    let bestScore = parseInt(localStorage.getItem('seq_pang_best') || '0');
    let combo = 0;
    let maxCombo = 0;
    let timeLeft = MAX_TIME;
    let gameTimer = null;

    // DOM 캐싱
    const boardElement = document.getElementById('board');
    const boardWrapper = document.getElementById('board-wrapper');
    const timerContainer = document.getElementById('timer-container');
    const timerBar = document.getElementById('timer-bar');
    const timerText = document.getElementById('timer-text');
    
    const scoreVal = document.getElementById('score-val');
    const bestScoreVal = document.getElementById('best-score-val');
    const comboVal = document.getElementById('combo-val');
    const comboBadge = document.getElementById('combo-badge');
    const dragLine = document.getElementById('drag-line');
    
    const welcomeOverlay = document.getElementById('welcome-overlay');
    const btnStart = document.getElementById('btn-start');
    
    const gameOverOverlay = document.getElementById('gameover-overlay');
    const finalScoreText = document.getElementById('final-score');
    const btnRetry = document.getElementById('btn-retry');
    const welcomeBestVal = document.getElementById('welcome-best-val');

    bestScoreVal.textContent = bestScore;
    welcomeBestVal.textContent = bestScore;

    // 1. 플레이 시작
    function startGamePlay() {
      welcomeOverlay.classList.add('hide');
      
      score = 0;
      combo = 0;
      maxCombo = 0;
      timeLeft = MAX_TIME;
      isGameOver = false;
      isGameActive = true;
      selectedTiles = [];
      
      scoreVal.textContent = '0';
      comboVal.textContent = '0';
      comboBadge.style.display = 'none';
      gameOverOverlay.classList.remove('show');
      
      boardData = [];
      boardElement.innerHTML = '';
      
      for (let r = 0; r < BOARD_SIZE; r++) {
        boardData[r] = [];
        for (let c = 0; c < BOARD_SIZE; c++) {
          const num = getRandomNumber();
          boardData[r][c] = num;
          
          const tile = document.createElement('div');
          tile.className = 'tile';
          tile.textContent = num;
          tile.dataset.row = r;
          tile.dataset.col = c;
          tile.id = `tile-${r}-${c}`;
          
          boardElement.appendChild(tile);
        }
      }

      if (gameTimer) clearInterval(gameTimer);
      gameTimer = setInterval(tickTimer, 100);
      updateTimerUI();
      dragLine.setAttribute('d', '');
    }

    function tickTimer() {
      if (isGameOver || !isGameActive) return;

      timeLeft -= 0.1;
      if (timeLeft <= 0) {
        timeLeft = 0;
        triggerGameOver();
      }
      updateTimerUI();
    }

    function updateTimerUI() {
      const percentage = (timeLeft / MAX_TIME) * 100;
      timerBar.style.width = `${percentage}%`;
      timerText.textContent = `${timeLeft.toFixed(1)}s`;

      if (timeLeft < 15) {
        timerBar.classList.add('warning');
      } else {
        timerBar.classList.remove('warning');
      }
    }


    function triggerGameOver() {
      isGameOver = true;
      isDragging = false;
      clearInterval(gameTimer);

      dragLine.setAttribute('d', '');
      selectedTiles.forEach(t => t.element.classList.remove('selected', 'last-selected'));

      finalScoreText.textContent = score;

      gameOverOverlay.classList.add('show');
    }

    // 포인터 위치 타일
    function getTileAtPosition(x, y) {
      const tiles = document.querySelectorAll('.tile');
      let targetTile = null;

      tiles.forEach(tile => {
        const rect = tile.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        
        const dist = Math.hypot(x - centerX, y - centerY);
        const activeRadius = rect.width * 0.4;
        
        if (dist < activeRadius) {
          targetTile = tile;
        }
      });

      return targetTile;
    }

    function handleStart(clientX, clientY) {
      if (isGameOver || !isGameActive) return;
      isDragging = true;
      const tile = getTileAtPosition(clientX, clientY);
      if (tile) {
        selectTile(tile);
      }
    }

    function handleMove(clientX, clientY) {
      if (!isDragging || isGameOver || !isGameActive) return;
      const tile = getTileAtPosition(clientX, clientY);
      if (!tile) {
        updateDragLine(clientX, clientY);
        return;
      }

      const r = parseInt(tile.dataset.row);
      const c = parseInt(tile.dataset.col);

      if (selectedTiles.length > 1) {
        const lastSecond = selectedTiles[selectedTiles.length - 2];
        if (lastSecond.row === r && lastSecond.col === c) {
          const popped = selectedTiles.pop();
          popped.element.classList.remove('selected', 'last-selected');
          
          if (selectedTiles.length > 0) {
            selectedTiles[selectedTiles.length - 1].element.classList.add('last-selected');
          }
          
          playAudioTick(true);
          updateDragLine(clientX, clientY);
          return;
        }
      }

      const isAlreadySelected = selectedTiles.some(t => t.row === r && t.col === c);
      if (isAlreadySelected) return;

      if (selectedTiles.length > 0) {
        const last = selectedTiles[selectedTiles.length - 1];
        const rowDiff = Math.abs(last.row - r);
        const colDiff = Math.abs(last.col - c);

        const isNeighbor = rowDiff <= 1 && colDiff <= 1 && !(rowDiff === 0 && colDiff === 0);
        if (!isNeighbor) return;
      }

      selectTile(tile);
      updateDragLine(clientX, clientY);
    }

    function handleEnd() {
      if (!isDragging) return;
      isDragging = false;

      if (selectedTiles.length >= 3) {
        evaluateSequence();
      } else {
        clearSelection();
      }
    }

    function selectTile(tileElement) {
      const r = parseInt(tileElement.dataset.row);
      const c = parseInt(tileElement.dataset.col);
      const val = boardData[r][c];

      if (selectedTiles.length > 0) {
        selectedTiles[selectedTiles.length - 1].element.classList.remove('last-selected');
      }

      tileElement.classList.add('selected', 'last-selected');
      selectedTiles.push({
        row: r,
        col: c,
        value: val,
        element: tileElement
      });

      playAudioTick(false);
    }

    function updateDragLine(currentX, currentY) {
      if (selectedTiles.length === 0) {
        dragLine.setAttribute('d', '');
        return;
      }

      const wrapperRect = boardWrapper.getBoundingClientRect();
      let pathData = '';

      selectedTiles.forEach((tile, index) => {
        const rect = tile.element.getBoundingClientRect();
        const x = rect.left + rect.width / 2 - wrapperRect.left;
        const y = rect.top + rect.height / 2 - wrapperRect.top;

        if (index === 0) {
          pathData += `M ${x} ${y}`;
        } else {
          pathData += ` L ${x} ${y}`;
        }
      });

      if (isDragging && currentX !== undefined && currentY !== undefined) {
        const localX = currentX - wrapperRect.left;
        const localY = currentY - wrapperRect.top;
        if (localX >= 0 && localX <= wrapperRect.width && localY >= 0 && localY <= wrapperRect.height) {
          pathData += ` L ${localX} ${localY}`;
        }
      }

      dragLine.setAttribute('d', pathData);
    }

    // 판정
    function evaluateSequence() {
      const values = selectedTiles.map(t => t.value);
      const len = values.length;

      let isAP = true;
      const diff = values[1] - values[0];
      for (let i = 1; i < len - 1; i++) {
        if (values[i + 1] - values[i] !== diff) {
          isAP = false;
          break;
        }
      }

      let isGP = true;
      const ratio = values[1] / values[0];
      for (let i = 1; i < len - 1; i++) {
        if (Math.abs((values[i + 1] / values[i]) - ratio) > 1e-9) {
          isGP = false;
          break;
        }
      }

      if (isAP || isGP) {
        combo++;
        if (combo > maxCombo) {
          maxCombo = combo;
        }

        const points = (len * 100) + ((combo - 1) * 30);
        score += points;
        
        if (score > bestScore) {
          bestScore = score;
          localStorage.setItem('seq_pang_best', bestScore);
          bestScoreVal.textContent = bestScore;
          welcomeBestVal.textContent = bestScore;
        }

        scoreVal.textContent = score;
        scoreVal.classList.add('pop');
        setTimeout(() => scoreVal.classList.remove('pop'), 150);

        comboVal.textContent = combo;
        comboBadge.style.display = 'inline-block';

        const bonusTime = 2.0 + (combo * 0.5);
        timeLeft = Math.min(MAX_TIME, timeLeft + bonusTime);
        updateTimerUI();

        spawnFloatingScore(points);

        selectedTiles.forEach(t => t.element.classList.add('matched'));
        setTimeout(() => {
          eliminateAndRefill();
        }, 350);

      } else {
        combo = 0;
        comboVal.textContent = combo;
        comboBadge.style.display = 'none';

        timeLeft = Math.max(0, timeLeft - 3.0); // 패널티 완화 -3초
        updateTimerUI();

        triggerFailureShock();

        selectedTiles.forEach(t => {
          t.element.style.backgroundColor = '#fecaca';
        });
        setTimeout(() => {
          clearSelection();
        }, 300);
      }
    }

    function spawnFloatingScore(scoreVal) {
      const lastTile = selectedTiles[selectedTiles.length - 1].element;
      const rect = lastTile.getBoundingClientRect();
      const wrapperRect = boardWrapper.getBoundingClientRect();

      const x = rect.left + rect.width / 2 - wrapperRect.left;
      const y = rect.top + rect.height / 2 - wrapperRect.top;

      const floatSpan = document.createElement('span');
      floatSpan.className = 'floating-score';
      floatSpan.textContent = `+${scoreVal}`;
      floatSpan.style.left = `${x}px`;
      floatSpan.style.top = `${y}px`;

      boardWrapper.appendChild(floatSpan);

      setTimeout(() => {
        floatSpan.remove();
      }, 800);
    }

    function triggerFailureShock() {
      timerContainer.classList.add('shake');
      boardWrapper.classList.add('shake');
      
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.frequency.setValueAtTime(140, audioCtx.currentTime);
        oscillator.frequency.linearRampToValueAtTime(70, audioCtx.currentTime + 0.25);
        gainNode.gain.setValueAtTime(0.18, audioCtx.currentTime);
        gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.25);
      } catch(e) {}

      setTimeout(() => {
        timerContainer.classList.remove('shake');
        boardWrapper.classList.remove('shake');
      }, 400);
    }

    function eliminateAndRefill() {
      selectedTiles.forEach(tile => {
        boardData[tile.row][tile.col] = null;
      });

      for (let c = 0; c < BOARD_SIZE; c++) {
        let tempCol = [];
        
        for (let r = BOARD_SIZE - 1; r >= 0; r--) {
          if (boardData[r][c] !== null) {
            tempCol.push(boardData[r][c]);
          }
        }
        
        const missingCount = BOARD_SIZE - tempCol.length;
        for (let i = 0; i < missingCount; i++) {
          tempCol.push(getRandomNumber());
        }
        
        tempCol.reverse();
        
        for (let r = 0; r < BOARD_SIZE; r++) {
          boardData[r][c] = tempCol[r];
        }
      }

      renderGravityRefill();
      clearSelection();
    }

    function renderGravityRefill() {
      for (let r = 0; r < BOARD_SIZE; r++) {
        for (let c = 0; c < BOARD_SIZE; c++) {
          const tile = document.getElementById(`tile-${r}-${c}`);
          const newVal = boardData[r][c];

          if (tile.textContent != newVal) {
            tile.textContent = newVal;
            tile.classList.add('falling');
            tile.style.transform = 'translateY(-22px)';
            tile.offsetHeight;
            tile.style.transform = 'translateY(0)';
            setTimeout(() => {
              tile.classList.remove('falling');
            }, 250);
          }
          tile.classList.remove('selected', 'last-selected', 'matched');
          tile.style.backgroundColor = '';
        }
      }
    }

    function clearSelection() {
      selectedTiles.forEach(t => {
        t.element.classList.remove('selected', 'last-selected', 'matched');
        t.element.style.backgroundColor = '';
      });
      selectedTiles = [];
      dragLine.setAttribute('d', '');
    }

    function playAudioTick(isBacktrack = false) {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        if (isBacktrack) {
          oscillator.type = 'sine';
          oscillator.frequency.setValueAtTime(180, audioCtx.currentTime);
          oscillator.frequency.exponentialRampToValueAtTime(90, audioCtx.currentTime + 0.08);
          gainNode.gain.setValueAtTime(0.08, audioCtx.currentTime);
          gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
          oscillator.start();
          oscillator.stop(audioCtx.currentTime + 0.08);
        } else {
          oscillator.type = 'sine';
          const baseFreq = 400 + (selectedTiles.length * 65);
          oscillator.frequency.setValueAtTime(baseFreq, audioCtx.currentTime);
          gainNode.gain.setValueAtTime(0.06, audioCtx.currentTime);
          gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.06);
          oscillator.start();
          oscillator.stop(audioCtx.currentTime + 0.06);
        }
      } catch (e) {}
    }

    // ----------------------------------------------------
    // 5. 이벤트 바인딩
    // ----------------------------------------------------
    boardWrapper.addEventListener('mousedown', (e) => {
      e.preventDefault();
      handleStart(e.clientX, e.clientY);
    });

    window.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      e.preventDefault();
      handleMove(e.clientX, e.clientY);
    });

    window.addEventListener('mouseup', (e) => {
      handleEnd();
    });

    boardWrapper.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const touch = e.touches[0];
      handleStart(touch.clientX, touch.clientY);
    }, { passive: false });

    window.addEventListener('touchmove', (e) => {
      if (!isDragging) return;
      e.preventDefault();
      const touch = e.touches[0];
      handleMove(touch.clientX, touch.clientY);
    }, { passive: false });

    window.addEventListener('touchend', (e) => {
      handleEnd();
    });

    btnStart.addEventListener('click', () => {
      startGamePlay();
    });

    btnRetry.addEventListener('click', () => {
      isGameActive = false;
      gameOverOverlay.classList.remove('show');
      welcomeOverlay.classList.remove('hide');
    });
  </script>
</body>
</html>
