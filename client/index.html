<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>시퀀스팡 - SEQUENCEPANG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Bagel+Fat+One&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script type="module" src="/src/main.js"></script>
  <link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#84cc16">

<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="시퀀스팡">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="시퀀스팡">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
</head>
<body>

  <div class="game-layout">
    
    <!-- 메인 게임 컨테이너 -->
    <div class="game-container" id="game-container">
      
      <!-- 웰컴 오버레이 (메인 화면) -->
      <div class="welcome-overlay" id="welcome-overlay">

        <!-- 배경 파티클 -->
        <span class="melon-particle particle-welcome-1">🍈</span>
        <span class="melon-particle particle-welcome-2">🍈</span>
        <span class="melon-particle particle-welcome-3">🍈</span>
        <span class="melon-particle particle-welcome-4">🍈</span>
        <span class="melon-particle particle-welcome-5">🍈</span>
        <span class="melon-particle particle-welcome-6">🍈</span>

        <!-- 반짝이 -->  
        <span class="sparkle sparkle-1"></span>
        <span class="sparkle sparkle-2"></span>
        <span class="sparkle sparkle-3"></span>
        <span class="sparkle sparkle-4"></span>
        <span class="sparkle sparkle-5"></span>

        <div class="welcome-card">
          <!-- 타이틀 -->
          <div class="welcome-title-grp">
            <div class="welcome-icon-wrap">
              <img class="welcome-icon" src="melon.png" alt="melon">
            </div>
            <div class="welcome-title-row">
              <h1 class="welcome-logo" aria-label="시퀀스팡">
                <svg viewBox="0 0 560 170" role="img" aria-hidden="true">
                  <defs>
                    <linearGradient id="logo-lime" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stop-color="#b8ff4d"/>
                      <stop offset="100%" stop-color="#72cf0a"/>
                    </linearGradient>
                  </defs>
                  <path d="M100 92 L212 84 L322 92 L446 82" stroke="rgba(148,242,13,0.5)" stroke-width="16" fill="none" stroke-linecap="round"/>
                  <g font-family="'Bagel Fat One', 'Jua', sans-serif" font-size="56" text-anchor="middle">
                    <g transform="translate(100,88) rotate(-6)">
                      <rect x="-46" y="-46" width="92" height="92" rx="18" fill="#fffbea" stroke="#0b3a2b" stroke-width="5"/>
                      <text y="20" fill="#14532d">시</text>
                      <text x="32" y="-24" font-family="Outfit, sans-serif" font-weight="800" font-size="17" fill="#72cf0a">1</text>
                    </g>
                    <g transform="translate(212,82) rotate(4)">
                      <rect x="-46" y="-46" width="92" height="92" rx="18" fill="#fffbea" stroke="#0b3a2b" stroke-width="5"/>
                      <text y="20" fill="#14532d">퀀</text>
                      <text x="32" y="-24" font-family="Outfit, sans-serif" font-weight="800" font-size="17" fill="#72cf0a">2</text>
                    </g>
                    <g transform="translate(322,90) rotate(-4)">
                      <rect x="-46" y="-46" width="92" height="92" rx="18" fill="#fffbea" stroke="#0b3a2b" stroke-width="5"/>
                      <text y="20" fill="#14532d">스</text>
                      <text x="32" y="-24" font-family="Outfit, sans-serif" font-weight="800" font-size="17" fill="#72cf0a">4</text>
                    </g>
                    <g transform="translate(446,80) rotate(7)">
                      <path fill="#ffd84d" opacity="0.9" transform="scale(1.35)" d="M0-58 L11-25 L41-41 L24-12 L58-6 L25 5 L41 36 L11 20 L3 57 L-9 24 L-39 38 L-24 9 L-57 1 L-25-9 L-38-39 L-11-22 Z"/>
                      <rect x="-50" y="-50" width="100" height="100" rx="20" fill="url(#logo-lime)" stroke="#0b3a2b" stroke-width="6"/>
                      <text y="22" font-size="60" fill="#06291f">팡</text>
                      <text x="36" y="-26" font-family="Outfit, sans-serif" font-weight="800" font-size="18" fill="#14532d">8</text>
                    </g>
                  </g>
                </svg>
              </h1>
            </div>
          </div>

          <!-- 베스트 스코어 -->
          <div class="welcome-best">
            <span class="welcome-best-label">최고 기록</span>
            <span id="welcome-best-val">0</span>
            <span class="welcome-best-unit">점</span>
          </div>

          <!-- 어제의 1등 도전 배너 -->
          <div class="yesterday-top-banner" id="yesterday-top-banner" hidden>
            <span class="yesterday-top-label">👑 어제의 1등</span>
            <span class="yesterday-top-text" id="yesterday-top-text"></span>
          </div>

          <!-- 하우 투 플레이 -->
          <!-- 플레이 모드 선택 버튼 -->
          <div class="lobby-input-grp welcome-nickname-grp">
            <label for="player-nickname" class="lobby-lbl">랭킹 닉네임</label>
            <input type="text" id="player-nickname" class="lobby-input" placeholder="닉네임 입력 (최대 10자)" maxlength="10" autocomplete="nickname">
          </div>
          <div id="mode-selection" class="mode-select-box">
            <button class="btn-start btn-primary" id="btn-single-start">혼자서 팡!</button>
            <div class="main-sub-actions">
              <button class="btn-start btn-accent btn-sub-action" id="btn-multi-lobby">다함께 팡!</button>
              <button class="btn-start btn-sub-action btn-ranking-open" id="btn-show-ranking" type="button">랭킹 보기</button>
            </div>
          </div>

          <!-- 멀티플레이 전용 로비 대기실 (기본 숨김) -->
          <div id="multi-lobby-card" class="multi-lobby-card is-initially-hidden">
            <div class="lobby-input-grp">
              <label for="lobby-nickname" class="lobby-lbl">내 닉네임</label>
              <input type="text" id="lobby-nickname" class="lobby-input" placeholder="닉네임 입력 (최대 10자, 공백 불가)" maxlength="10" autocomplete="nickname">
            </div>
            
            <div class="lobby-action-box">
              <!-- 방 만들기 -->
              <button class="lobby-btn btn-join btn-primary" id="btn-create-room">대기방 새로 만들기</button>
              
              <div class="lobby-divider">─ 또는 다른 방 참가하기 ─</div>
              
              <!-- 방 참가하기 -->
              <div class="lobby-input-grp">
                <input type="text" id="lobby-room-id" class="lobby-input lobby-room-code-input" placeholder="방 코드 6자리 입력" maxlength="6">
              </div>
              <button class="lobby-btn btn-join" id="btn-join-room">입력한 대기방 참가</button>
            </div>
            
            <button class="lobby-btn btn-cancel btn-full lobby-back-button" id="btn-lobby-back">돌아가기</button>
          </div>
        </div>
      </div>

      <!-- 실시간 대기방 오버레이 (방 참여 후 진입) -->
      <div id="lobby-overlay" class="lobby-overlay hide">
        <!-- 배경 파티클 -->
        <span class="melon-particle particle-lobby-1">🍈</span>
        <span class="melon-particle particle-lobby-2">🍈</span>
        <span class="melon-particle particle-lobby-3">🍈</span>
        <span class="melon-particle particle-lobby-4">🍈</span>

        <div class="lobby-overlay-card">
          <h2 class="lobby-header-title">실시간 대기실</h2>
          <span id="lobby-room-badge" class="lobby-room-badge is-copyable" title="클릭해서 복사">방 코드: LOADING</span>
          
          <div class="htp-title lobby-section-title">현재 대기 중인 플레이어</div>
          <div id="lobby-p-list" class="lobby-p-list-box">
            <!-- 대기 플레이어 목록 동적 주입 -->
          </div>

          <div id="lobby-waiting-info" class="lobby-ready-msg">
            친구들에게 방 코드를 공유하고 최대 30명이 함께 도전해 보세요!<br>
            (방 코드를 클릭하면 복사됩니다)
          </div>

          <div class="lobby-btn-row lobby-btn-stack">
            <button class="btn-start btn-accent btn-full" id="btn-lobby-play">시퀀스팡 플레이 시작!</button>
            <button class="lobby-btn btn-cancel btn-full" id="btn-lobby-exit">대기방 나가기</button>
          </div>
        </div>
      </div>

      <!-- 게임 시작 전 3, 2, 1 카운트다운 오버레이 -->
      <div id="countdown-overlay" class="countdown-overlay">
        <div id="countdown-text" class="countdown-text">3</div>
      </div>

      <!-- HUD 영역 (점수, 콤보 등) -->
      <div class="hud">
        <div class="hud-item">
          <div class="hud-label" id="best-score-label">최고 점수</div>
          <div class="hud-value" id="best-score-val">0</div>
        </div>
        <div class="hud-item">
          <div class="hud-label" id="score-label">현재 점수</div>
          <div class="hud-value" id="score-val">0</div>
        </div>
        <div class="hud-item">
          <div class="hud-label">콤보</div>
          <div class="hud-value">
            <span id="combo-val">0</span>
            <span class="combo-badge" id="combo-badge">🔥</span>
          </div>
        </div>
      </div>

      <!-- 타이머 영역 -->
      <div class="timer-container" id="timer-container">
        <div class="timer-bar" id="timer-bar"></div>
        <div class="timer-text" id="timer-text">30.0s</div>
      </div>

      <div class="fever-panel" id="fever-panel">
        <div class="fever-timer-track">
          <div class="fever-timer-fill" id="fever-timer-fill"></div>
        </div>
        <div class="fever-timer-text" id="fever-timer-text">피버 0.0s</div>
      </div>

      <!-- 게임 보드 -->
      <div class="board-wrapper" id="board-wrapper">
        <div class="fever-notice" id="fever-notice">피버!</div>
        <div class="board" id="board"></div>
        <svg class="drag-svg">
          <defs>
            <linearGradient id="drag-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#ecfccb"></stop>
              <stop offset="45%" stop-color="#bef264"></stop>
              <stop offset="100%" stop-color="#22c55e"></stop>
            </linearGradient>
          </defs>
          <path class="drag-line drag-line-glow" id="drag-line-glow" d=""></path>
          <path class="drag-line drag-line-core" id="drag-line" d=""></path>
        </svg>
      </div>

      <!-- 게임 오버 오버레이 -->
      <div class="overlay" id="gameover-overlay">
        <div class="gameover-card">
          <h2 class="gameover-title" id="gameover-title">타임 오버!</h2>
          <div class="gameover-desc" id="gameover-desc">수고하셨습니다. 당신의 기록은...</div>
          
          <div class="result-row">
            <span class="result-label" id="result-label">최종 점수</span>
            <span class="result-val"><span id="final-score">0</span><span id="result-unit">점</span></span>
          </div>

          <section class="global-ranking" id="global-ranking">
            <div class="global-ranking-heading">
              <strong>오늘 랭킹 TOP 30</strong>
              <span id="score-submit-status" aria-live="polite"></span>
            </div>
            <ol class="global-ranking-list" id="global-ranking-list">
              <li class="global-rank-empty">랭킹을 불러오는 중...</li>
            </ol>
            <button type="button" class="score-submit-retry" id="score-submit-retry" hidden>점수 등록 다시 시도</button>
          </section>
          
          <button class="btn-retry" id="btn-retry">메인 화면으로 돌아가기</button>
        </div>
      </div>

      <!-- 실시간 순위표 (Live Leaderboard) -->
      <div id="leaderboard-panel" class="leaderboard-panel is-initially-hidden">
        <div class="leaderboard-header">
          <span class="leaderboard-title">실시간 랭킹 순위표</span>
          <span id="room-badge" class="room-badge">방 코드: LOAD</span>
        </div>
        <div id="leaderboard-list" class="leaderboard-list">
          <!-- 실시간 랭킹 목록이 스크립트를 통해 생성됨 -->
        </div>
      </div>

    </div>
  </div>
</body>
</html>
